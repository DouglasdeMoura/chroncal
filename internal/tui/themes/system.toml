# tcal "system" theme — chrome AND accents from the terminal palette.
#
# Every color token references either an ANSI palette index (0..15) or a
# semantic role (text, surface, …) that itself resolves to an ANSI index.
# At boot, OSC 4 queries the terminal for the actual rendered RGB of each
# of the 16 palette slots and the theme loader substitutes those real
# hexes into the resolved Theme. That means:
#
#   - Chrome and accents follow the user's terminal palette: switch
#     Omarchy theme (alucard, gruvu, hinterlands, …) and the UI follows.
#   - OKLCh contrast computations (event chips, button/badge text)
#     receive real hex values, so text-on-accent contrast is exact
#     rather than guessed from lipgloss's default ANSI table.
#
# When the terminal doesn't answer OSC 4 (older terminals, tmux without
# passthrough), lipgloss renders the ANSI references directly — still
# correct, just without the OKLCh-on-real-hex precision. Text-on-accent
# foregrounds are computed at render time via oklch.ContrastingFg, so we
# no longer ship button_text / badge_text tokens.
#
# Base16-aligned palette assumptions (de-facto standard across Omarchy,
# Catppuccin, Gruvbox, Tokyo Night, Nord, etc.):
#
#   0 base00  background           4 base0D  blue   (primary accent)
#   1 base08  red    (danger)      5 base0E  magenta (focus highlight)
#   2 base0B  green  (positive)    6 base0C  cyan   (secondary accent)
#   3 base0A  yellow (warning)     7 base05  default foreground
#   8 base03  comment/dim         15 base07  inverted bg / brightest
#
# Selection is still derived adaptively from the live terminal bg via
# OSC 11 (±8 % OKLCh L shift), so it adapts even on terminals that
# don't answer OSC 4. The static hex fallbacks below kick in only when
# both OSC 4 and OSC 11 are unanswered.

name        = "system"
description = "Terminal ANSI palette for every chrome and accent slot"

# ---------------------------------------------------------------------------
# Structural chrome
# ---------------------------------------------------------------------------

text     = "7"      # base05 — default foreground (always contrasts with bg)
text_dim = "auto"   # OKLab mix of text+surface (60/40); see note below
muted    = "auto"   # OKLab mix of text+surface (45/55) — a notch dimmer
border   = "8"      # base03 — panel borders (acceptable to be dim, structural line)
surface  = "0"      # base00 — panel background, matches terminal default

# Why "auto" for text_dim and muted: on dark Base16 themes, ANSI 8
# (base03) intentionally sits close to the background — it's tuned to
# fade syntax comments into the page. That's wrong for UI dim text the
# user is supposed to read (footer hints, weekday header, calendar
# names). At theme load time, the loader replaces "auto" with an OKLab
# interpolation between Text and Surface, yielding a perceptually
# balanced mid-tone on every terminal palette.

# Selected row highlight. Bubble Tea overrides this in app.go with an
# adaptive ±8 % L shift from the live terminal background (via OSC 11)
# when that answer is available. The fallback hexes below are picked
# from Dracula's Selection token (light cool gray on both light and
# dark themes) for terminals where OSC 11 doesn't answer.
selected      = { light = "#CFCFDE", dark = "#44475A" }
selected_text = "7"   # base05 reads on a neutral gray on both modes

# ---------------------------------------------------------------------------
# Accent palette — all from the terminal's ANSI 16
# ---------------------------------------------------------------------------

primary   = "4"   # base0D blue — brand accent (calendar selected cell border)
secondary = "6"   # base0C cyan
accent    = "2"   # base0B green — positive actions
today     = "1"   # base08 red — "now line", today indicator
error     = "1"   # base08 red

# ---------------------------------------------------------------------------
# Badges
# ---------------------------------------------------------------------------

badge_ok      = "2"   # green
badge_warn    = "3"   # yellow
badge_danger  = "1"   # red
badge_info    = "6"   # cyan
badge_neutral = "8"   # dim

# ---------------------------------------------------------------------------
# Form internals
# ---------------------------------------------------------------------------

# Labels use base05 (default fg). Do NOT use base03 here: on some
# inverted light themes (e.g. Omarchy Alucard) base03 sits very close to
# the cream background and labels disappear.
form_label     = "7"
form_required  = "1"
form_error     = "1"
form_highlight = "5"   # base0E magenta — focus flash / non-primary focus bg

# ---------------------------------------------------------------------------
# Buttons
# ---------------------------------------------------------------------------

button_bg        = "8"   # neutral gray; app.go overrides adaptively
button_danger_bg = "1"   # red
button_ghost_fg  = "8"   # transparent button foreground

# ---------------------------------------------------------------------------
# Calendar palette swatches
#
# ANSI only offers 16 colors, which is too few for distinctive per-calendar
# colors. Keep hex swatches here so users still get a useful palette in the
# calendar dialog even when the rest of the UI inherits the terminal theme.
# ---------------------------------------------------------------------------

calendar_swatches = [
  "#0074D9", "#7FDBFF", "#B10DC9",
  "#85144b", "#FF4136", "#FF851B",
  "#FFDC00", "#3D9970",
]
