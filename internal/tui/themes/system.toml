# tcal "system" theme — terminal palette for chrome, Dracula hex for accents.
#
# Structural chrome (text, bg, muted, border, form_label, button_secondary_bg)
# references ANSI palette indices so the terminal emulator's theme drives
# those tones. That keeps the app rooted in the user's terminal — change
# your Omarchy/terminal theme and the chrome follows automatically.
#
# ACCENT colors (primary, danger, ok, info, today, form_highlight, …) are
# fixed Dracula hexes instead of ANSI indices. Why: ANSI index rendering
# varies enormously by terminal theme (Tokyo Night's ANSI 4 is a pale blue
# close to its bright_white; Alucard's ANSI 0 can be the cream bg itself).
# That makes it impossible to pick a single ANSI-indexed "text on accent"
# color that reads well everywhere. Dracula's accent palette is designed
# for high luminance contrast against both light (#F1F1F0) and dark
# (#282A36) backgrounds, so a single dark text color (#282A36) reads on
# every accent, on every terminal — no palette guessing required.
#
# Base16 index conventions used below:
#   0 base00  default background
#   7 base05  default foreground  (always contrasts with bg)
#   8 base03  subdued / comment   (mid-tone on both light and dark)
#  15 base07  background-adjacent (caution: varies on inverted themes)
#
# Dracula spec: https://draculatheme.com/spec

name        = "system"
description = "Terminal ANSI chrome + fixed Dracula accent palette"

# ---------------------------------------------------------------------------
# Structural chrome — ANSI-inherited
# ---------------------------------------------------------------------------

# De-emphasized chrome: base03 (gray on any theme).
muted     = "8"
# Default foreground — base05 always contrasts with the terminal bg.
# Do NOT use ANSI 0/15 here; on inverted themes they can collapse to bg.
text      = "7"
# Lower-contrast text: base03.
text_dim  = "8"
# Borders: base03 (gray).
border    = "8"
# Panel background — base00 matches the terminal default so Surface can
# be used as a "reset background" foreground against colored cells.
surface   = "0"

# Selected row highlight. Dracula's dedicated Selection token — neutral
# cool gray outside the ANSI palette; reliably contrasts with base05
# (default fg) on both the Dracula and Alucard themes. When Bubble Tea
# reports the actual terminal bg over OSC 11, app.go overrides this with
# an adaptive ±8 % L shift from that bg, so it also adapts to
# non-Dracula terminals. These hexes are the fallback.
selected      = { light = "#CFCFDE", dark = "#44475A" }
# Text on top of Selected. base05 (default fg) is always the right
# direction against the neutral Selection gray: dark-on-light on light
# themes, light-on-dark on dark themes.
selected_text = "7"

# ---------------------------------------------------------------------------
# Accent palette — Dracula hexes (stable across terminals)
# ---------------------------------------------------------------------------

# Brand/headers: Dracula Purple.
primary   = "#BD93F9"
# Secondary accents: Dracula Cyan.
secondary = "#8BE9FD"
# Positive / accent: Dracula Green.
accent    = "#50FA7B"
# "Today" highlight: Dracula Red.
today     = "#FF5555"
# Errors: Dracula Red.
error     = "#FF5555"

# ---------------------------------------------------------------------------
# Badges
# ---------------------------------------------------------------------------

badge_ok      = "#50FA7B"
badge_warn    = "#FFB86C"
badge_danger  = "#FF5555"
badge_info    = "#8BE9FD"
badge_neutral = "8"
# Badge foreground: Dracula's dark bg color. Every Dracula accent sits
# at mid luminance (L ~0.70–0.85 in OKLCh), so #282A36 (L ~0.22) reads
# on all of them; ΔL ~0.5 is well above WCAG comfort.
badge_text    = "#282A36"

# ---------------------------------------------------------------------------
# Form internals
# ---------------------------------------------------------------------------

# Labels use base05 (default fg) rather than base03, because on some
# Base16 themes (notably inverted light ones like Omarchy ALucard)
# base03 sits very close to the background and labels disappear.
form_label     = "7"
form_required  = "#FF5555"
form_error     = "#FF5555"
# Flash / select-arrow / non-primary button focus: Dracula Pink.
form_highlight = "#FF79C6"

# ---------------------------------------------------------------------------
# Buttons
# ---------------------------------------------------------------------------

button_primary_bg         = "#BD93F9"
button_primary_focused_bg = "#FF79C6"
# Secondary at rest uses Selected (neutral gray, adaptive from OSC 11
# when available — see app.go). Focused variants all share
# form_highlight so the focus signal is consistent across variants.
button_secondary_bg       = "8"
button_danger_bg          = "#FF5555"
button_danger_focused_bg  = "#FF79C6"
button_ghost_fg           = "8"
# Button foreground on filled accent bgs — same dark as badge_text.
button_text               = "#282A36"

# ---------------------------------------------------------------------------
# Calendar palette swatches
#
# ANSI only offers 16 colors, which is too few for distinctive per-calendar
# colors. Keep hex swatches here so users still get a useful palette in the
# calendar dialog even when the rest of the UI inherits the terminal theme.
# ---------------------------------------------------------------------------

calendar_swatches = [
  "#0074D9", "#7FDBFF", "#B10DC9",
  "#85144b", "#FF4136", "#FF851B",
  "#FFDC00", "#3D9970",
]
