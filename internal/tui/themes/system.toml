# tcal "system" theme — inherits the terminal's ANSI palette.
#
# Every token references an ANSI palette index (0-15) instead of a hex
# value, so the terminal emulator's own theme drives the final colors.
# This is the same approach as lazygit, fzf, and tig: change your
# terminal theme (or Omarchy theme, which themes the terminal) and tcal
# follows automatically with zero restart.
#
# Base16 index conventions (used by Omarchy and most modern themes):
#   0 base00  default background
#   7 base05  default foreground  (always contrasts with bg)
#   8 base03  subdued / comment   (mid-tone on both light and dark)
#  15 base07  background-adjacent (caution: can be close to bg on inverted themes)
#
# Those three — 0, 7, 8 — are the only indices whose semantics stay
# stable across both light and dark Base16 variants. Use them for
# text/background/muted. Hues (1-6, 9-14) keep their identity on either
# variant, so we can use them for accents with optional brightness
# variants.

name        = "system"
description = "Inherits the terminal's ANSI 0-15 palette (Omarchy-friendly)"

# ---------------------------------------------------------------------------
# Structural chrome
# ---------------------------------------------------------------------------

# Brand/headers: blue
primary   = { light = "4", dark = "12" }
# Secondary accents: cyan
secondary = { light = "6", dark = "14" }
# Positive / accent: green
accent    = { light = "2", dark = "10" }
# De-emphasized chrome: base03 (gray on any theme).
muted     = "8"
# Default foreground — base05 always contrasts with the terminal bg on
# both light and dark themes. Do NOT use ANSI 0/15 here; on inverted
# light themes (e.g. Omarchy ALucard) ANSI 0 can be the cream bg color.
text      = "7"
# Lower-contrast text: base03.
text_dim  = "8"
# Borders: base03 (gray).
border    = "8"
# "Today" highlight: red.
today     = { light = "1", dark = "9" }
# Selected row highlight — base03 reads as a visible gray against both
# the default bg and the default fg, so it never collapses.
selected      = "8"
# Text painted on top of Selected. Same inverse-luminance rationale as
# badge_text / button_text: base00 is the light bg on any light theme
# and base07 is the brightest color on any dark theme, so either reads
# as a high-contrast light foreground against the mid-tone gray of
# Selected — which is what breaks down when using `text` (base05).
selected_text = { light = "0", dark = "15" }
# Panel background — base00 matches the terminal default so Surface can
# be used as a "reset background" foreground against colored cells.
surface   = "0"
# Errors: red.
error     = { light = "1", dark = "9" }

# ---------------------------------------------------------------------------
# Badges
# ---------------------------------------------------------------------------

badge_ok      = "2"
badge_warn    = "3"
badge_danger  = "1"
badge_info    = "4"
badge_neutral = "8"
# Badge foreground: opposite luminance of the terminal bg. On light
# themes base00 is the (light) bg color itself, so base00 reads as a
# high-contrast light fg over any colored accent bg; on dark themes
# base07 is the brightest color and plays the same role. This is the
# inverse direction of `text`, which is why it has its own token.
badge_text    = { light = "0", dark = "15" }

# ---------------------------------------------------------------------------
# Form internals
# ---------------------------------------------------------------------------

# Labels use base05 (default fg) rather than base03, because on some
# Base16 themes (notably inverted light ones like Omarchy ALucard)
# base03 sits very close to the background and labels disappear.
form_label     = "7"
form_required  = { light = "1", dark = "9" }
form_error     = { light = "1", dark = "9" }
# Flash / select highlight: magenta.
form_highlight = { light = "5", dark = "13" }

# ---------------------------------------------------------------------------
# Buttons
# ---------------------------------------------------------------------------

button_primary_bg         = { light = "4", dark = "12" }
button_primary_focused_bg = { light = "5", dark = "13" }
button_secondary_bg       = "8"
button_danger_bg          = "1"
button_danger_focused_bg  = "9"
button_ghost_fg           = "8"
# Button foreground: inverse luminance of the terminal bg (see badge_text).
button_text               = { light = "0", dark = "15" }

# ---------------------------------------------------------------------------
# Calendar palette swatches
#
# ANSI only offers 16 colors, which is too few for distinctive per-calendar
# colors. Keep hex swatches here so users still get a useful palette in the
# calendar dialog even when the rest of the UI inherits the terminal theme.
# ---------------------------------------------------------------------------

calendar_swatches = [
  "#0074D9", "#7FDBFF", "#B10DC9",
  "#85144b", "#FF4136", "#FF851B",
  "#FFDC00", "#3D9970",
]
