name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: DeterminateSystems/nix-installer-action@v22

      # The flake derives its version from the VERSION file, so a tag whose
      # VERSION was not bumped would ship a release whose `nix run` reports
      # the previous version. Fail fast instead.
      - name: Verify VERSION matches tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [ "$file_version" != "$tag_version" ]; then
            echo "::error::VERSION file ($file_version) does not match tag ($tag_version); bump VERSION before tagging"
            exit 1
          fi

      - name: Build and test via the flake
        run: nix build .#chroncal --no-link --print-build-logs

      # GoReleaser publishes everything: release assets, the Homebrew
      # formula, the Scoop manifest, and both AUR packages. Each packaging
      # token is optional — when one is unset, that channel skips itself in
      # .goreleaser.yml and the rest of the release proceeds.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SSH private key registered to the AUR maintainer account.
          AUR_KEY: ${{ secrets.AUR_KEY }}
          # PATs with write access to the tap/bucket repos; Scoop falls back
          # to the Homebrew token when no dedicated token is configured.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN || secrets.HOMEBREW_TAP_TOKEN }}
