name: Update flake.lock

# Keeps the flake's nixpkgs/flake-utils inputs fresh. This runs monthly,
# manually, and after the Release workflow succeeds. Do not use `on: release`:
# releases are created by GoReleaser with GITHUB_TOKEN, and GitHub suppresses
# most follow-up workflow events created by GITHUB_TOKEN.
on:
  schedule:
    - cron: "0 6 1 * *" # monthly, 1st at 06:00 UTC
  workflow_dispatch:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update flake inputs
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: DeterminateSystems/update-flake-lock@v28
        with:
          pr-title: "chore(nix): update flake.lock"
          commit-msg: "chore(nix): update flake.lock"
