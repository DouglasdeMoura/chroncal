name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.26"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Run tests
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        run: go build -o chroncal ./cmd/chroncal

  release-config:
    name: Release config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      # `goreleaser check` exits 1 for invalid config and 2 for valid config
      # that uses deprecated properties. We use `brews` knowingly (its cask
      # replacement is macOS-only and the tap also serves Linux), so tolerate
      # exactly exit code 2.
      - name: Check GoReleaser config
        run: |
          goreleaser check && exit 0
          if [ $? -eq 2 ]; then
            echo "::warning::goreleaser config uses deprecated properties (expected: brews; see .goreleaser.yml)"
            exit 0
          fi
          exit 1
