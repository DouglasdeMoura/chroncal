name: Nix

# Catches a stale flake vendorHash at PR time (it must change whenever
# go.mod/go.sum change) instead of after release, when `nix run` would
# already be broken for users.
#
# `nix build` is a REQUIRED status check on master, so the pull_request
# trigger is intentionally NOT path-filtered: a required check that gets
# skipped (because a PR didn't touch the filtered paths) reports as pending
# forever and blocks the merge. Running it on every PR guarantees the
# context is always reported. The push trigger keeps its path filter since
# master only needs a rebuild when these files move.
on:
  push:
    branches:
      - master
    paths:
      - go.mod
      - go.sum
      - flake.nix
      - flake.lock
      - VERSION
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: nix build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Build and test via the flake
        run: nix build .#chroncal --no-link --print-build-logs
