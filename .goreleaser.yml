version: 2

builds:
  - main: ./cmd/chroncal
    binary: chroncal
    env:
      - CGO_ENABLED=0
    # Explicit target list rather than a goos/goarch cross-product: the
    # pure-Go SQLite driver (modernc.org/sqlite -> modernc.org/libc) only
    # ships generated code for a fixed set of platforms, and goreleaser
    # fails the whole release if any single target won't compile. These 18
    # targets are the ones verified to build; mips*, ppc64 (big-endian),
    # windows/arm, freebsd/386+arm, netbsd, dragonfly, solaris, illumos,
    # aix, and plan9 are excluded because modernc.org/libc has no support.
    targets:
      - linux_amd64
      - linux_arm64
      - linux_arm_6
      - linux_arm_7
      - linux_386
      - linux_riscv64
      - linux_s390x
      - linux_ppc64le
      - linux_loong64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
      - windows_arm64
      - windows_386
      - freebsd_amd64
      - freebsd_arm64
      - openbsd_amd64
      - openbsd_arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    # Append the ARM version (v6/v7) so the two linux_arm targets don't
    # both resolve to ..._linux_arm.tar.gz and collide during archiving.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

# The source archive is what `aur_sources` builds from, so the AUR source
# package pins the exact released tree instead of GitHub's mutable
# auto-generated tarball.
source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Version }}"
  prefix_template: "{{ .ProjectName }}-{{ .Version }}/"

# All package channels below follow the same graceful degradation: each one
# keys off its token env var and disables itself (or skips upload) when the
# secret is absent, so a missing token never fails the whole release.

# Casks replaced formulas for prebuilt binaries (goreleaser deprecated
# `brews` in v2.10, removal in v2.16). Casks work on Linux since
# Homebrew 4.5 (April 2025). The tap carries a tap_migrations.json that
# moves existing formula installs over on `brew upgrade`.
homebrew_casks:
  - name: chroncal
    repository:
      owner: DouglasdeMoura
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/DouglasdeMoura/chroncal
    description: Terminal-first calendar, todo, and journal manager
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_TOKEN" }}false{{ else }}true{{ end }}'
    commit_msg_template: "chroncal {{ .Version }}"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    binaries:
      - chroncal
    # The binaries are not signed/notarized, so macOS quarantines them on
    # download; strip the attribute or Gatekeeper blocks the first run.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/chroncal"]
          end

scoops:
  - name: chroncal
    repository:
      owner: DouglasdeMoura
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    directory: bucket
    homepage: https://github.com/DouglasdeMoura/chroncal
    description: Terminal-first calendar, todo, and journal manager
    license: MIT
    skip_upload: '{{ if index .Env "SCOOP_BUCKET_TOKEN" }}false{{ else }}true{{ end }}'
    commit_msg_template: "chroncal {{ .Version }}"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com

aurs:
  - name: chroncal-bin
    homepage: https://github.com/DouglasdeMoura/chroncal
    description: Terminal-first calendar, todo, and journal manager
    license: MIT
    maintainers:
      - Douglas de Moura <douglas at demoura dot dev>
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/chroncal-bin.git
    disable: '{{ if index .Env "AUR_KEY" }}false{{ else }}true{{ end }}'
    provides: [chroncal]
    conflicts: [chroncal]
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    package: |-
      install -Dm755 "./chroncal" "${pkgdir}/usr/bin/chroncal"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/chroncal-bin/LICENSE"

aur_sources:
  - name: chroncal
    homepage: https://github.com/DouglasdeMoura/chroncal
    description: Terminal-first calendar, todo, and journal manager
    license: MIT
    maintainers:
      - Douglas de Moura <douglas at demoura dot dev>
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/chroncal.git
    disable: '{{ if index .Env "AUR_KEY" }}false{{ else }}true{{ end }}'
    # Default is x86_64/aarch64 only; the source package builds fine on the
    # other Arch-supported targets the Go toolchain covers.
    arches: [x86_64, aarch64, armv7h, armv6h, i686]
    makedepends: [go]
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    prepare: |-
      cd "${pkgname}-${pkgver}"
      go mod download
    build: |-
      cd "${pkgname}-${pkgver}"
      export CGO_ENABLED=0
      export GOPATH="${srcdir}/gopath"
      export GOCACHE="${srcdir}/gocache"
      export GOFLAGS="-trimpath -mod=readonly -modcacherw"
      go build -ldflags "-s -w -X main.version=${pkgver} -X main.commit={{ .ShortCommit }} -X main.date={{ .Date }}" -o chroncal ./cmd/chroncal
    package: |-
      cd "${pkgname}-${pkgver}"
      install -Dm755 "./chroncal" "${pkgdir}/usr/bin/chroncal"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/chroncal/LICENSE"

release:
  # Keep release notes about *this* release. Install instructions live in the
  # README (the single source of truth) rather than being duplicated on every
  # release page.
  header: |
    📦 **Install:** see the [README](https://github.com/DouglasdeMoura/chroncal#installation). Prebuilt binaries and `checksums.txt` are attached below.
  footer: |
    **Full Changelog**: https://github.com/DouglasdeMoura/chroncal/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  sort: asc
  # Keep the commit SHA prefix on each entry; GitHub auto-links it to the
  # commit on the rendered release page.
  # Drop non-user-facing commits. Patterns are unanchored to the scope so
  # both "docs:" and "docs(cli):" match (the old "^docs:" form silently
  # let every scoped chore/docs commit leak into the changelog).
  filters:
    exclude:
      - "^docs"
      - "^chore"
      - "^ci"
      - "^style"
      - "^test"
      - "^build"
      - "^refactor"
      - "^Merge "
  # Group what's left by Conventional Commit type so the release notes read
  # as Features / Bug fixes / Performance rather than a flat list.
  groups:
    - title: "🚀 Features"
      regexp: '^feat'
      order: 0
    - title: "🐛 Bug fixes"
      regexp: '^fix'
      order: 1
    - title: "⚡ Performance"
      regexp: '^perf'
      order: 2
    - title: "Other changes"
      order: 999
