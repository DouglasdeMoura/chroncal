version: 2

builds:
  - main: ./cmd/chroncal
    binary: chroncal
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
      - netbsd
      - dragonfly
      - solaris
      - illumos
      - aix
      - plan9
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
      - ppc64
      - ppc64le
      - mips
      - mipsle
      - mips64
      - mips64le
      - riscv64
      - s390x
      - loong64
    goarm:
      - "6"
      - "7"
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^style:"
